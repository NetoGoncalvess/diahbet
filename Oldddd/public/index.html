<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiahBet — Bolão Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch:#0B3D2E;
    --pitch-dark:#082B20;
    --gold:#D4AF37;
    --cream:#F7F3E9;
    --ink:#13201B;
    --red:#C1440E;
    --line: rgba(247,243,233,0.14);
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--pitch);
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 80px);
    color: var(--cream);
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header{
    padding: 36px 20px 24px;
    text-align:center;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow{
    font-family:'Space Mono', monospace;
    letter-spacing: 3px;
    font-size: 12px;
    color: var(--gold);
    text-transform: uppercase;
  }
  h1{
    font-family:'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(36px, 8vw, 56px);
    margin: 6px 0 4px;
    letter-spacing: 1px;
    color: var(--cream);
  }
  h1 span{ color: var(--gold); }
  .subtitle{
    color: rgba(247,243,233,0.7);
    font-size: 14px;
    max-width: 480px;
    margin: 0 auto;
  }

  main{
    max-width: 720px;
    margin: 32px auto 0;
    padding: 0 16px;
  }

  .ranking-link{
    display:flex;
    justify-content:center;
    margin-bottom: 24px;
  }
  .ranking-link a{
    font-family:'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    border: 1px solid var(--gold);
    padding: 8px 16px;
    border-radius: 4px;
    transition: background 0.15s ease;
  }
  .ranking-link a:hover{ background: rgba(212,175,55,0.12); }

  .empty{
    text-align:center;
    color: rgba(247,243,233,0.6);
    padding: 60px 20px;
    font-family:'Space Mono', monospace;
    font-size: 13px;
  }

  .jogo-card{
    background: var(--cream);
    color: var(--ink);
    border-radius: 6px;
    margin-bottom: 20px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    border: 1px solid rgba(0,0,0,0.05);
  }
  .jogo-fase{
    background: var(--pitch-dark);
    color: var(--gold);
    font-family:'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    display:flex;
    justify-content: space-between;
  }
  .jogo-fase .data{ color: rgba(247,243,233,0.65); letter-spacing: 0.5px; }

  .jogo-body{
    padding: 18px 20px 20px;
  }
  .times{
    display:flex;
    align-items:center;
    justify-content: center;
    gap: 18px;
    font-family:'Oswald', sans-serif;
    font-weight: 600;
    font-size: 20px;
    text-transform: uppercase;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .times .vs{
    font-family:'Space Mono', monospace;
    font-size: 12px;
    color: var(--red);
    font-weight: 700;
  }
  .resultado-real{
    text-align:center;
    font-family:'Space Mono', monospace;
    font-size: 12px;
    color: var(--red);
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .palpite-form{
    display:flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
  }
  .palpite-form input[type=text]{
    flex: 1 1 160px;
    padding: 10px 12px;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 4px;
    font-family:'Work Sans', sans-serif;
    font-size: 14px;
  }
  .placar-input{
    display:flex;
    align-items:center;
    gap: 6px;
    background: var(--ink);
    padding: 6px 10px;
    border-radius: 4px;
  }
  .placar-input input[type=number]{
    width: 42px;
    text-align:center;
    font-family:'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    background: transparent;
    color: var(--gold);
    border: none;
    outline: none;
  }
  .placar-input span{ color: var(--cream); font-family:'Space Mono', monospace; }

  button.enviar{
    background: var(--red);
    color: var(--cream);
    border: none;
    padding: 10px 18px;
    border-radius: 4px;
    font-family:'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-size: 13px;
    cursor: pointer;
    transition: filter 0.15s ease;
  }
  button.enviar:hover{ filter: brightness(1.1); }
  button.enviar:disabled{ opacity: 0.5; cursor: default; }

  .msg{
    text-align:center;
    font-size: 12px;
    font-family:'Space Mono', monospace;
    min-height: 16px;
    margin-bottom: 10px;
  }
  .msg.ok{ color: #1e7d32; }
  .msg.erro{ color: var(--red); }

  .palpites-lista{
    border-top: 1px dashed rgba(0,0,0,0.15);
    padding-top: 10px;
  }
  .palpites-lista summary{
    cursor: pointer;
    font-family:'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(19,32,27,0.6);
    outline: none;
  }
  .palpite-item{
    display:flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .palpite-item .placar{
    font-family:'Space Mono', monospace;
    font-weight: 700;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Copa do Mundo 2026 · Fase Mata-Mata</div>
  <h1>Diah<span>Bet</span></h1>
  <p class="subtitle">Chuta o placar dos jogos e mostra que sabe de futebol. Só o nome, sem senha, sem enrolação.</p>
</header>

<main>
  <div class="ranking-link"><a href="/ranking.html">Ver ranking</a></div>
  <div id="jogos-container">
    <div class="empty">Carregando jogos…</div>
  </div>
</main>

<script>
async function carregarJogos() {
  const container = document.getElementById('jogos-container');
  try {
    const res = await fetch('/api/jogos');
    const jogos = await res.json();

    if (!jogos.length) {
      container.innerHTML = '<div class="empty">Nenhum jogo cadastrado ainda. Peça pro admin cadastrar em /admin.html</div>';
      return;
    }

    container.innerHTML = '';
    for (const jogo of jogos) {
      container.appendChild(criarCardJogo(jogo));
    }
  } catch (err) {
    container.innerHTML = '<div class="empty">Erro ao carregar os jogos. Tenta de novo em alguns segundos.</div>';
  }
}

function formatarData(dataStr) {
  if (!dataStr) return '';
  const d = new Date(dataStr);
  return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function criarCardJogo(jogo) {
  const card = document.createElement('div');
  card.className = 'jogo-card';

  const temResultado = jogo.placar_casa_real !== null && jogo.placar_casa_real !== undefined;

  card.innerHTML = `
    <div class="jogo-fase">
      <span>${jogo.fase || 'Mata-mata'}</span>
      <span class="data">${formatarData(jogo.data_jogo)}</span>
    </div>
    <div class="jogo-body">
      <div class="times">
        <span>${jogo.time_casa}</span>
        <span class="vs">VS</span>
        <span>${jogo.time_fora}</span>
      </div>
      ${temResultado ? `<div class="resultado-real">RESULTADO: ${jogo.placar_casa_real} x ${jogo.placar_fora_real}</div>` : ''}

      <form class="palpite-form" data-jogo-id="${jogo.id}">
        <input type="text" name="nome" placeholder="Seu nome" required maxlength="40">
        <div class="placar-input">
          <input type="number" name="placar_casa" min="0" max="20" value="0" required>
          <span>x</span>
          <input type="number" name="placar_fora" min="0" max="20" value="0" required>
        </div>
        <button type="submit" class="enviar">Chutar</button>
      </form>
      <div class="msg" id="msg-${jogo.id}"></div>

      <details class="palpites-lista">
        <summary id="resumo-${jogo.id}">ver palpites</summary>
        <div id="lista-${jogo.id}"></div>
      </details>
    </div>
  `;

  const form = card.querySelector('form');
  form.addEventListener('submit', (e) => enviarPalpite(e, jogo.id));

  carregarPalpites(jogo.id);

  return card;
}

async function enviarPalpite(e, jogoId) {
  e.preventDefault();
  const form = e.target;
  const btn = form.querySelector('button');
  const msg = document.getElementById(`msg-${jogoId}`);

  const nome = form.nome.value.trim();
  const placar_casa = parseInt(form.placar_casa.value, 10);
  const placar_fora = parseInt(form.placar_fora.value, 10);

  if (!nome) {
    msg.textContent = 'Digite seu nome';
    msg.className = 'msg erro';
    return;
  }

  btn.disabled = true;
  try {
    const res = await fetch(`/api/jogos/${jogoId}/palpites`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, placar_casa, placar_fora })
    });
    if (!res.ok) throw new Error();
    msg.textContent = `Palpite salvo: ${nome} — ${placar_casa} x ${placar_fora}`;
    msg.className = 'msg ok';
    carregarPalpites(jogoId);
  } catch (err) {
    msg.textContent = 'Erro ao salvar. Tenta de novo.';
    msg.className = 'msg erro';
  } finally {
    btn.disabled = false;
  }
}

async function carregarPalpites(jogoId) {
  const lista = document.getElementById(`lista-${jogoId}`);
  const resumo = document.getElementById(`resumo-${jogoId}`);
  try {
    const res = await fetch(`/api/jogos/${jogoId}/palpites`);
    const palpites = await res.json();
    resumo.textContent = `ver palpites (${palpites.length})`;
    lista.innerHTML = palpites.map(p => `
      <div class="palpite-item">
        <span>${p.nome}</span>
        <span class="placar">${p.placar_casa} x ${p.placar_fora}</span>
      </div>
    `).join('') || '<div class="palpite-item"><span>Nenhum palpite ainda</span></div>';
  } catch (err) {
    lista.innerHTML = '<div class="palpite-item"><span>Erro ao carregar</span></div>';
  }
}

carregarJogos();
</script>
</body>
</html>
