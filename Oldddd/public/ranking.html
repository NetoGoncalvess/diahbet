<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiahBet — Ranking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch:#0B3D2E; --pitch-dark:#082B20; --gold:#D4AF37;
    --cream:#F7F3E9; --ink:#13201B; --red:#C1440E; --line: rgba(247,243,233,0.14);
  }
  *{ box-sizing: border-box; }
  body{
    margin:0; background: var(--pitch); color: var(--cream);
    font-family:'Work Sans', sans-serif; min-height:100vh; padding-bottom:60px;
  }
  header{ padding: 30px 20px 20px; text-align:center; border-bottom:1px solid var(--line); }
  .eyebrow{ font-family:'Space Mono', monospace; letter-spacing:3px; font-size:11px; color:var(--gold); text-transform:uppercase; }
  h1{ font-family:'Oswald', sans-serif; font-weight:700; font-size:34px; margin:6px 0; }
  h1 span{ color: var(--gold); }
  a.voltar{ color: rgba(247,243,233,0.6); font-size:12px; text-decoration:none; }

  main{ max-width: 560px; margin: 28px auto; padding: 0 16px; }

  table{ width:100%; border-collapse: collapse; background: var(--cream); color: var(--ink); border-radius:6px; overflow:hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
  thead th{
    background: var(--pitch-dark); color: var(--gold);
    font-family:'Space Mono', monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:1px; padding: 10px 12px; text-align:left;
  }
  thead th.num, tbody td.num{ text-align:center; }
  tbody td{ padding: 10px 12px; border-bottom: 1px solid rgba(0,0,0,0.06); font-size:14px; }
  tbody tr:first-child td{ font-weight:700; }
  .pos{ font-family:'Space Mono', monospace; color: rgba(19,32,27,0.5); width: 30px; }
  .placar-exato{ color: var(--red); font-weight:700; }
  .empty{ text-align:center; padding: 40px; color: rgba(247,243,233,0.6); font-family:'Space Mono', monospace; font-size:13px; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Ranking do bolão</div>
  <h1>Diah<span>Bet</span></h1>
  <a class="voltar" href="/">← voltar pro bolão</a>
</header>

<main>
  <div id="ranking-container">Carregando…</div>
</main>

<script>
async function carregarRanking() {
  const container = document.getElementById('ranking-container');
  try {
    const res = await fetch('/api/ranking');
    const dados = await res.json();

    if (!dados.length) {
      container.innerHTML = '<div class="empty">Ainda não tem palpites suficientes com resultado pra montar o ranking.</div>';
      return;
    }

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th class="num">#</th>
            <th>Nome</th>
            <th class="num">Placar exato</th>
            <th class="num">Acertou o vencedor</th>
          </tr>
        </thead>
        <tbody>
          ${dados.map((d, i) => `
            <tr>
              <td class="pos">${i + 1}</td>
              <td>${d.nome}</td>
              <td class="num placar-exato">${d.placar_exato}</td>
              <td class="num">${d.acertou_vencedor}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (err) {
    container.innerHTML = '<div class="empty">Erro ao carregar o ranking.</div>';
  }
}

carregarRanking();
</script>
</body>
</html>
